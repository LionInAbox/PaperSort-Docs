site_name: Paper Sort - Official Documentation
nav:
  - Overview: index.md
  - PaperSort/PaperBox: papersort.md
  - PaperFloat: paperfloat.md
  - PaperShadow: papershadow.md
  # add links to your other files. e.g.:
  # - Features: features.md
theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top       # "back to top" button
    - search.highlight     # highlights search matches
    - content.code.copy    # copy button on code blocks

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true